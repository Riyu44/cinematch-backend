services:
  - type: web
    name: cinematch-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python preload_model.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: TMDB_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
